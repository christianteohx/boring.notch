name: "Release"

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: false

permissions:
  contents: write

env:
  IS_DEV_BUILD: ${{ github.ref == 'refs/heads/dev' }}

jobs:
  build:
    runs-on: macos-latest
    env:
      PROJECT_NAME: boringNotch
      XCODE_VERSION: "16.4"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: |
          XCODE_PATH="/Applications/Xcode_${XCODE_VERSION}.app"
          if [[ ! -d "$XCODE_PATH" ]]; then
            echo "Available Xcode versions:"
            ls -d /Applications/Xcode*.app 2>/dev/null || echo "  (none found)"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Get version
        id: version
        run: |
          if [[ "${{ env.IS_DEV_BUILD }}" == "true" ]]; then
            # For dev builds, use branch name + date
            TAG="dev-$(date +%Y%m%d-%H%M%S)"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project ${{ env.PROJECT_NAME }}.xcodeproj

      - name: Build and archive
        run: |
          xcodebuild clean archive \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.PROJECT_NAME }} \
            -archivePath ${{ env.PROJECT_NAME }} \
            -destination "generic/platform=macOS" \
            DEVELOPMENT_TEAM="${{ vars.DEVELOPMENT_TEAM_ID || '' }}" \
            CODE_SIGN_IDENTITY="-" \
            ONLY_ACTIVE_ARCH=NO

      - name: Export app
        run: |
          mkdir -p Release
          cat > "$RUNNER_TEMP/export_options.plist" <<'EOF'
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key>
              <string>mac-application</string>
              <key>signingStyle</key>
              <string>automatic</string>
            </dict>
            </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "${{ env.PROJECT_NAME }}.xcarchive" \
            -exportPath Release \
            -exportOptionsPlist "$RUNNER_TEMP/export_options.plist"

      - name: Fix code signatures (ad-hoc sign all frameworks + app)
        run: |
          echo "Ad-hoc signing all embedded frameworks..."
          for f in "Release/${{ env.PROJECT_NAME }}.app/Contents/Frameworks"/*.framework; do
            echo "  Signing $(basename $f)..."
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          echo "Ad-hoc signing main app bundle..."
          codesign --force --sign - "Release/${{ env.PROJECT_NAME }}.app" 2>/dev/null || true
          echo "Done."

      - name: Rename app for dev builds
        if: env.IS_DEV_BUILD == 'true'
        run: |
          mv "Release/${{ env.PROJECT_NAME }}.app" "Release/${{ env.PROJECT_NAME }}-dev.app"
          echo "APP_NAME=${{ env.PROJECT_NAME }}-dev" >> $GITHUB_ENV

      - name: Rename app for prod builds
        if: env.IS_DEV_BUILD != 'true'
        run: |
          echo "APP_NAME=${{ env.PROJECT_NAME }}" >> $GITHUB_ENV

      - name: Create DMG
        run: |
          VENV_DIR="$RUNNER_TEMP/venv"
          python3 -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install --require-hashes -r Configuration/dmg/requirements.txt
          chmod +x Configuration/dmg/create_dmg.sh
          ./Configuration/dmg/create_dmg.sh \
            "Release/${{ env.APP_NAME }}.app" \
            "Release/${{ env.APP_NAME }}.dmg" \
            "${{ env.APP_NAME }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: boringNotch-dmg
          path: Release/${{ env.APP_NAME }}.dmg
          retention-days: 30

  release:
    needs: build
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: boringNotch-dmg
          path: .
      - name: List files
        run: ls -la

      - name: Create Release (dev)
        if: env.IS_DEV_BUILD == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body: "Dev build from ${{ github.sha }} — for testing only"
          files: boringNotch-dev.dmg
          tag_name: "dev-latest"
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (prod)
        if: env.IS_DEV_BUILD != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: boringNotch.dmg
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
